name: Build and push Umami image

on:
  workflow_dispatch:  # Manual trigger
    inputs:
      base_path:
        description: 'Base path (ex: stats for /stats)'
        required: true
        default: 'stats'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout umami source
        uses: actions/checkout@v4
        with:
          repository: umami-software/umami
          ref: master

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BASE_PATH=/${{ github.event.inputs.base_path }}
          tags: |
            ghcr.io/${{ github.repository }}/umami:path-${{ github.event.inputs.base_path }}
            ghcr.io/${{ github.repository }}/umami:latest