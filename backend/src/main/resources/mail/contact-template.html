<html>
  <body style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background-color: #f5f5f7; padding: 24px;">
    <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
      <tr>
        <td align="center">
          <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="max-width: 600px; background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);">
            <tr>
              <td style="background: linear-gradient(135deg, #38bdf8, #a855f7); padding: 18px 24px; color: #0f172a;">
                <h2 style="margin: 0; font-size: 20px; font-weight: 700;">New contact message</h2>
                <p style="margin: 4px 0 0; font-size: 13px; opacity: 0.9;">via <b>{{platformName}}</b> contact form</p>
              </td>
            </tr>
            <tr>
              <td style="padding: 20px 24px 8px; color: #0f172a;">
                <p style="margin: 0 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #6b7280;">From</p>
                <p style="margin: 0 0 16px; font-size: 14px;"><strong>{{fromEmail}}</strong></p>

                <p style="margin: 0 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #6b7280;">Subject</p>
                <p style="margin: 0 0 16px; font-size: 14px;">{{subject}}</p>

                <p style="margin: 0 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #6b7280;">Message</p>
                <div style="margin: 0 0 4px; padding: 12px 14px; border-radius: 10px; background-color: #f9fafb; border: 1px solid #e5e7eb; font-size: 14px; line-height: 1.5; white-space: pre-wrap;">
                  {{message}}
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding: 0 24px 18px; font-size: 11px; color: #9ca3af;">
                <p style="margin: 0;">This email was generated by your website contact form. User-generated content is escaped to prevent HTML injection.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
